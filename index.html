<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathan's Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-indigo-400 mb-2">📩 Temp Mail Generator</h1>
            <p class="text-slate-400">สร้าง Email ชั่วคราว และรับข้อมูลได้ทันที</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 mb-6">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="flex-1 w-full">
                    <label class="block text-sm text-slate-400 mb-1">Your Temporary Email:</label>
                    <input type="text" id="emailAddr" readonly 
                        class="w-full bg-slate-950 border border-slate-600 p-3 rounded-lg text-indigo-300 font-mono text-lg focus:outline-none"
                        value="กำลังสร้าง Email...">
                </div>
                <div class="flex gap-2 w-full md:w-auto mt-6">
                    <button onclick="copyEmail()" class="flex-1 bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-lg transition">Copy</button>
                    <button onclick="generateNewEmail()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg transition font-bold">Gen New</button>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
                <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                    <h2 class="font-bold">Inbox</h2>
                    <span id="status" class="text-xs text-green-400 animate-pulse">Checking...</span>
                </div>
                <div id="emailList" class="divide-y divide-slate-700 max-h-[500px] overflow-y-auto">
                    <p class="p-4 text-sm text-slate-500 text-center">ยังไม่มีข้อความเข้า...</p>
                </div>
            </div>

            <div class="md:col-span-2 bg-slate-800 rounded-2xl border border-slate-700 p-6 min-h-[400px]">
                <div id="emailContent">
                    <h2 class="text-xl font-bold mb-4 text-indigo-300">ยินดีต้อนรับ!</h2>
                    <p class="text-slate-400">เลือกข้อความจากทางซ้ายมือเพื่ออ่านรายละเอียด</p>
                    <hr class="my-6 border-slate-700">
                    <div class="text-slate-500 italic">
                        ระบบจะทำการเช็คเมลใหม่ให้คุณโดยอัตโนมัติทุกๆ 5 วินาที...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let domain = "1secmail.com";
        let checkInterval;

        // 1. สุ่มชื่อ Email
        function generateNewEmail() {
            const chars = 'abcdefghijklmnopqrstuvwxyz1234567890';
            let name = '';
            for (let i = 0; i < 10; i++) {
                name += chars[Math.floor(Math.random() * chars.length)];
            }
            currentEmail = `${name}@${domain}`;
            document.getElementById('emailAddr').value = currentEmail;
            
            // ล้างข้อมูลเก่า
            document.getElementById('emailList').innerHTML = '<p class="p-4 text-sm text-slate-500 text-center">รอรับข้อความใหม่...</p>';
            document.getElementById('emailContent').innerHTML = '<h2 class="text-xl font-bold mb-4 text-indigo-300">เปลี่ยนเป็น Inbox ใหม่แล้ว</h2><p class="text-slate-400">กำลังรอข้อความสำหรับ ' + currentEmail + '</p>';
            
            startChecking();
        }

        // 2. ดึงรายการข้อความ
        async function checkInbox() {
            if (!currentEmail) return;
            const [user, domain] = currentEmail.split('@');
            try {
                const response = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${user}&domain=${domain}`);
                const mails = await response.json();
                
                const listContainer = document.getElementById('emailList');
                if (mails.length > 0) {
                    listContainer.innerHTML = mails.map(mail => `
                        <div onclick="readMessage('${mail.id}')" class="p-4 hover:bg-slate-700 cursor-pointer transition">
                            <div class="text-sm font-bold truncate text-indigo-300">${mail.from}</div>
                            <div class="text-xs truncate text-slate-300">${mail.subject}</div>
                            <div class="text-[10px] text-slate-500 mt-1">${mail.date}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error("Error fetching inbox:", error);
            }
        }

        // 3. อ่านเนื้อหา Email
        async function readMessage(id) {
            const [user, domain] = currentEmail.split('@');
            document.getElementById('emailContent').innerHTML = '<p class="animate-pulse">กำลังโหลดข้อความ...</p>';
            
            try {
                const response = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${user}&domain=${domain}&id=${id}`);
                const data = await response.json();
                
                document.getElementById('emailContent').innerHTML = `
                    <div class="mb-4">
                        <div class="text-sm text-slate-400">จาก: <span class="text-slate-200">${data.from}</span></div>
                        <div class="text-sm text-slate-400">หัวข้อ: <span class="text-slate-200">${data.subject}</span></div>
                    </div>
                    <hr class="border-slate-700 my-4">
                    <div class="bg-white text-black p-4 rounded-lg overflow-x-auto">
                        ${data.htmlBody || data.body}
                    </div>
                `;
            } catch (error) {
                alert("ไม่สามารถโหลดข้อความได้");
            }
        }

        function copyEmail() {
            const copyText = document.getElementById("emailAddr");
            copyText.select();
            document.execCommand("copy");
            alert("คัดลอก Email แล้ว: " + copyText.value);
        }

        function startChecking() {
            clearInterval(checkInterval);
            checkInbox();
            checkInterval = setInterval(checkInbox, 5000); // เช็คทุก 5 วินาที
        }

        // เริ่มต้นครั้งแรก
        generateNewEmail();
    </script>
</body>
</html>
